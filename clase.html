<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo Presentación - Pro English</title>
  <style>
    :root {
      --bg-body: #f8fafc; --bg-slide: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
      --accent: #2563eb; --accent-success: #16a34a; --accent-error: #dc2626; --font: 'Segoe UI', system-ui, sans-serif;
      --radius: 16px; --transition: all 0.25s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .btn-volver { position: absolute; top: 20px; left: 20px; background: #ffffff; color: var(--text-main); border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.9rem; font-weight: 700; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: var(--transition); }
    .btn-volver:hover { background: #f8fafc; border-color: #94a3b8; transform: translateY(-1px); }

    .split-screen-container { flex: 1; display: grid; grid-template-columns: 40% 60%; height: calc(100vh - 80px); overflow: hidden; }
    @media (max-width: 850px) { .split-screen-container { grid-template-columns: 1fr; } .media-panel { display: none; } }

    .media-panel { width: 100%; height: 100%; background-position: center; background-size: cover; position: relative; border-right: 1px solid #e2e8f0; }
    .media-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(15,23,42,0.1), rgba(15,23,42,0.4)); }

    .content-panel { display: flex; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }

    .slide { background-color: var(--bg-slide); width: 100%; max-width: 750px; border-radius: var(--radius); padding: 40px; display: none; flex-direction: column; justify-content: center; }
    .slide.active { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    .slide-tag { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
    .slide h2 { font-size: 2.1rem; color: var(--accent); margin-bottom: 15px; font-weight: 800; letter-spacing: -0.5px; }
    .slide p { font-size: 1.15rem; line-height: 1.6; margin-bottom: 15px; color: #334155; }
    
    .formula-box { background-color: #f8fafc; border-left: 5px solid var(--accent); padding: 18px; border-radius: 4px; font-family: monospace; font-size: 1.15rem; font-weight: 700; margin: 15px 0; color: #1e293b; white-space: pre-line; border: 1px solid #f1f5f9; border-left: 5px solid var(--accent); }
    .examples-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .examples-list li { font-size: 1.1rem; padding-left: 25px; position: relative; color: #334155; }
    .examples-list li::before { content: "→"; color: var(--accent); font-size: 1.2rem; position: absolute; left: 0; font-weight: bold; }

    .quiz-block { display: none; flex-direction: column; gap: 12px; }
    .quiz-block.active { display: flex; }
    .quiz-option { background-color: #f8fafc; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-size: 1.05rem; font-weight: 600; border: 2px solid #e2e8f0; transition: var(--transition); color: #334155; }
    .quiz-option:hover { background-color: #f1f5f9; border-color: #cbd5e1; transform: translateX(4px); }
    .quiz-option.correct { background-color: #f0fdf4; border-color: var(--accent-success); color: #166534; pointer-events: none; }
    .quiz-option.incorrect { background-color: #fef2f2; border-color: var(--accent-error); color: #991b1b; }
    .feedback-msg { font-size: 1.1rem; font-weight: 700; margin-top: 15px; min-height: 25px; line-height: 1.5; }

    .bar-controles { background-color: #ffffff; border-top: 1px solid #e2e8f0; height: 80px; padding: 0 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.02); }
    .btn-nav { background-color: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.95rem; transition: var(--transition); }
    .btn-nav:hover { background-color: #1d4ed8; }
    .btn-nav:disabled { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    .slide-indicator { font-size: 1rem; color: var(--text-muted); font-weight: 600; }
  </style>
</head>
<body>

  <a href="index.html" class="btn-volver">⬅ Menú General</a>

  <div class="split-screen-container">
    <div class="media-panel" id="imgFondoLateral"><div class="media-overlay"></div></div>
    <div class="content-panel" id="slidesWrapper"></div>
  </div>

  <div class="bar-controles">
    <button class="btn-nav" id="btnPrev" disabled>◀ Anterior</button>
    <div id="indicador" class="slide-indicator">Procesando...</div>
    <button class="btn-nav" id="btnNext">Siguiente ▶</button>
  </div>

  <script src="datos_gramatica.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const temaId = params.get('tema');
    const datosTema = CURSO_GRAMATICA[temaId];
    const wrapper = document.getElementById('slidesWrapper');
    const imgFondoLateral = document.getElementById('imgFondoLateral');
    let currentSlide = 0;

    if (!datosTema) {
      wrapper.innerHTML = `<div class="slide active"><h2>Error</h2><p>Módulo no indexado.</p></div>`;
    } else {
      imgFondoLateral.style.backgroundImage = `url('${datosTema.imagenDestacada || 'https://images.unsplash.com/photo-1546410531-bb4caa6b424d?q=80&w=600'}')`;

      datosTema.diapositivas.forEach((d, index) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = `slide ${index === 0 ? 'active' : ''}`;
        
        let html = `<div class="slide-tag">${datosTema.tituloNivel}</div>`;
        html += `<h2>${d.titulo}</h2><p>${d.contenido}</p>`;
        
        // CORRECCIÓN AQUÍ: Solo añade la caja si 'formula' existe y no es undefined
        if (d.formula && d.formula !== "undefined") {
          html += `<div class="formula-box">${d.formula}</div>`;
        }
        
        if (d.tipo === "ejemplos_visuales" && d.ejemplos) {
          html += `<ul class="examples-list">`;
          d.ejemplos.forEach(ej => html += `<li>${ej}</li>`);
          html += `</ul>`;
        }

        if (d.tipo === "examen_multi_pregunta") {
          d.preguntas.forEach((p, pIdx) => {
            html += `
              <div class="quiz-block ${pIdx === 0 ? 'active' : ''}" id="qBlock-${index}-${pIdx}">
                <p style="font-style: italic; background: #f8fafc; padding: 14px; border-radius: 8px; font-weight:600; margin-bottom:15px; border: 1px dashed #cbd5e1; color:#0f172a;">${p.enunciado}</p>
                <div class="quiz-container">
            `;
            p.opciones.forEach(opt => {
              html += `<div class="quiz-option" onclick="evaluarRespuesta(this, ${opt.correcta}, '${opt.feedback.replace(/'/g, "\\'")}', 'fb-${index}-${pIdx}')">${opt.texto}</div>`;
            });
            html += `
                </div>
                <div class="feedback-msg" id="fb-${index}-${pIdx}"></div>
                ${pIdx < d.preguntas.length - 1 ? `<button class="btn-nav" style="margin-top:15px; background-color:#0f172a; width:100%;" onclick="avanzarPregunta(${index}, ${pIdx})">Next Question ➔</button>` : ''}
              </div>
            `;
          });
        }
        
        slideDiv.innerHTML = html;
        wrapper.appendChild(slideDiv);
      });

      const slides = document.querySelectorAll('.slide');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      const indicador = document.getElementById('indicador');

      function updateSlides() {
        slides.forEach((s, idx) => s.classList.toggle('active', idx === currentSlide));
        btnPrev.disabled = currentSlide === 0;
        btnNext.disabled = currentSlide === slides.length - 1;
        indicador.innerText = `Sección ${currentSlide + 1} de ${slides.length}`;

        if (currentSlide === slides.length - 1) {
          localStorage.setItem(`completado_${temaId}`, "true");
        }
      }

      btnNext.addEventListener('click', () => { if (currentSlide < slides.length - 1) { currentSlide++; updateSlides(); } });
      btnPrev.addEventListener('click', () => { if (currentSlide > 0) { currentSlide--; updateSlides(); } });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) { currentSlide++; updateSlides(); }
        else if (e.key === 'ArrowLeft' && currentSlide > 0) { currentSlide--; updateSlides(); }
      });
      updateSlides();
    }

    function avanzarPregunta(slideIdx, currentQueryIdx) {
      const currentBlock = document.getElementById(`qBlock-${slideIdx}-${currentQueryIdx}`);
      const nextBlock = document.getElementById(`qBlock-${slideIdx}-${currentQueryIdx + 1}`);
      if(currentBlock && nextBlock) {
        currentBlock.classList.remove('active');
        nextBlock.classList.add('active');
      }
    }

    function evaluarRespuesta(elemento, esCorrecto, feedbackTexto, feedbackId) {
      const opciones = elemento.parentElement.querySelectorAll('.quiz-option');
      opciones.forEach(opt => opt.classList.remove('correct', 'incorrect'));
      const fb = document.getElementById(feedbackId);
      
      if (esCorrecto) {
        elemento.classList.add('correct');
        fb.style.color = 'var(--accent-success)'; fb.innerHTML = "🎉 Excellent! " + feedbackTexto;
      } else {
        elemento.classList.add('incorrect');
        fb.style.color = 'var(--accent-error)'; fb.innerHTML = "❌ Let's review: " + feedbackTexto;
      }
    }
  </script>
</body>
</html>
